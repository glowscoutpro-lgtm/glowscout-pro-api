services:
  - type: web
    name: glowscout-pro-api
    runtime: node
    plan: starter
    buildCommand: npm --prefix server ci --include=dev && npm --prefix server run build
    startCommand: node server/dist/index.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
